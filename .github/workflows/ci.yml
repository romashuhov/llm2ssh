name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [ "ubuntu:24.04", "debian:12" ]
    steps:
      - uses: actions/checkout@v4
      - name: Run bats + shellcheck in ${{ matrix.image }}
        run: |
          docker run --rm -v "$PWD":/src:ro -w /src "${{ matrix.image }}" \
            bash /src/test/docker-entry.sh
