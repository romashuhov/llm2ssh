# /etc/tmpfiles.d/llm2ssh.conf — recreates the /run/llm2ssh runtime tree at boot.
# See docs/CONTRACTS.md §approval-spool for the permission rationale.
#
# Type Path                         Mode Owner       Group        Age Argument
d /run/llm2ssh                      0755 root        root         -
d /run/llm2ssh/agents               0755 root        root         -
d /run/llm2ssh/approvals            0755 root        root         -
# req/: agents write their own approval requests; sticky prevents cross-deletion.
d /run/llm2ssh/approvals/req        3770 root        llm2ssh      -
# res/: ONLY the bot mints decisions; agents (group llm2ssh) read-only.
d /run/llm2ssh/approvals/res        2750 llm2ssh-bot llm2ssh      -
# notify/: only root + bot (group llm2ssh-bot) write; agents CANNOT (no phishing).
d /run/llm2ssh/notify               2770 root        llm2ssh-bot  -
# relay/: bot-internal chat relay spool.
d /run/llm2ssh/relay                2770 llm2ssh-bot llm2ssh-bot  -
