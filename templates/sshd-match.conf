# Managed by llm2ssh — DO NOT EDIT.
# Hardens SSH for every managed agent (members of group llm2ssh). This restricts
# CAPABILITIES (forwarding, agent, X11, tunnels), not commands: the agent needs a
# real interactive shell, so command filtering here would be theater. The
# load-bearing line is AuthorizedKeysFile: keys live in a ROOT-OWNED path so an
# agent cannot append its own key to ~/.ssh/authorized_keys and self-persist.
Match Group llm2ssh
    AuthorizedKeysFile /etc/llm2ssh/keys/%u
    AuthenticationMethods publickey
    PasswordAuthentication no
    KbdInteractiveAuthentication no
    AllowTcpForwarding no
    AllowStreamLocalForwarding no
    AllowAgentForwarding no
    X11Forwarding no
    PermitTunnel no
    PermitUserRC no
